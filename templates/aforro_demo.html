<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aforro Demo Frontend</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        h1 { color: #2c3e50; }
        section { margin-bottom: 2rem; }
        label { display: block; margin-top: 1rem; }
        input, select, button { margin-top: 0.5rem; }
        .result { background: #f4f4f4; padding: 1rem; margin-top: 1rem; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Aforro API Demo</h1>
    <section>
        <h2>Product List</h2>
        <button onclick="fetchProducts()">Load Products</button>
        <div id="products" class="result"></div>
    </section>
    <section>
        <h2>Product Detail</h2>
        <label for="productId">Product ID:</label>
        <input type="number" id="productId">
        <button onclick="fetchProductDetail()">Get Detail</button>
        <div id="productDetail" class="result"></div>
    </section>
    <section>
        <h2>Search Products</h2>
        <label for="searchQuery">Query:</label>
        <input type="text" id="searchQuery">
        <label for="sortSelect">Sort by:</label>
        <select id="sortSelect">
            <option value="relevance">Relevance</option>
            <option value="price">Price</option>
            <option value="newest">Newest</option>
        </select>
        <label for="pageSize">Page size:</label>
        <input type="number" id="pageSize" value="20" min="1" style="width: 60px;">
        <button onclick="searchProducts(1)">Search</button>
        <div style="margin-top: 0.5rem;">
            <button onclick="prevPage()">Prev</button>
            <span id="pageInfo"></span>
            <button onclick="nextPage()">Next</button>
        </div>
        <div id="searchResults" class="result"></div>
    </section>
    <section>
        <h2>Order Product</h2>
        <label for="orderProductId">Product ID:</label>
        <input type="number" id="orderProductId">
        <label for="orderQuantity">Quantity:</label>
        <input type="number" id="orderQuantity" value="1">
        <button onclick="orderProduct()">Order</button>
        <div id="orderResult" class="result"></div>
    </section>
    <section>
        <h2>Inventory</h2>
        <button onclick="fetchInventory()">Show Inventory</button>
        <div id="inventory" class="result"></div>
    </section>
    <script>
        const apiBase = '/api';
        let currentPage = 1;
        let totalPages = 1;
        let lastQuery = '';
        let lastSort = 'relevance';
        let lastPageSize = 20;
        let lastResults = null;
        function fetchProducts() {
            fetch(`${apiBase}/products/`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('products').textContent = JSON.stringify(data, null, 2);
                });
        }
        function fetchProductDetail() {
            const id = document.getElementById('productId').value;
            if (!id) return alert('Enter Product ID');
            fetch(`${apiBase}/products/${id}/`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('productDetail').textContent = JSON.stringify(data, null, 2);
                });
        }
        function searchProducts(page = 1) {
            const q = document.getElementById('searchQuery').value;
            const sort = document.getElementById('sortSelect').value;
            const pageSize = parseInt(document.getElementById('pageSize').value) || 20;
            lastQuery = q;
            lastSort = sort;
            lastPageSize = pageSize;
            currentPage = page;
            const params = new URLSearchParams({
                q,
                sort,
                page: page.toString(),
                page_size: pageSize.toString()
            });
            fetch(`${apiBase}/search/products/?${params.toString()}`)
                .then(r => r.json())
                .then(data => {
                    lastResults = data;
                    document.getElementById('searchResults').textContent = JSON.stringify(data.results, null, 2);
                    // Pagination info
                    const total = data.count || 0;
                    totalPages = Math.ceil(total / pageSize) || 1;
                    document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
                });
        }

        function prevPage() {
            if (currentPage > 1) {
                searchProducts(currentPage - 1);
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                searchProducts(currentPage + 1);
            }
        }
        function orderProduct() {
            const product = document.getElementById('orderProductId').value;
            const quantity = document.getElementById('orderQuantity').value;
            fetch(`${apiBase}/orders/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ product, quantity })
            })
                .then(r => r.json())
                .then(data => {
                    document.getElementById('orderResult').textContent = JSON.stringify(data, null, 2);
                });
        }
        function fetchInventory() {
            fetch(`${apiBase}/inventory/`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('inventory').textContent = JSON.stringify(data, null, 2);
                });
        }
    </script>
</body>
</html>
